<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Happy Birthday Prakrathi✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#ffd6e8,#ffeaf4);
height:100vh;
overflow:hidden;
}

.page{
width:100%;
height:100vh;

display:none;

justify-content:center;
align-items:center;

flex-direction:column;

text-align:center;

padding:30px;
}

.active{
display:flex;
}

h1{
color:#ff3b7a;
margin-bottom:20px;
}

p{
font-size:18px;
line-height:1.8;
color:#444;
}

button{

margin-top:25px;

padding:14px 28px;

border:none;

border-radius:40px;

background:#ff4f88;

color:white;

font-size:18px;

cursor:pointer;

}

.count{

font-size:130px;

font-weight:bold;

color:white;

text-shadow:0 0 30px pink;

}

.card{

background:white;

padding:30px;

border-radius:25px;

box-shadow:0 10px 40px rgba(0,0,0,.15);

max-width:450px;

}

.fade{
animation:fade 1s;
}

@keyframes fade{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

.hearts{
position:absolute;

font-size:30px;

animation:up 5s linear infinite;
}

@keyframes up{

from{
transform:translateY(100vh);
}

to{
transform:translateY(-150px);
}

}

</style>

</head>

<body>


<!-- Countdown -->

<div id="page1" class="page active">

<div class="count" id="number">
5
</div>

</div>



<!-- Welcome -->

<div id="page2" class="page">

<div class="card fade">

<h1>✨ Welcome ✨</h1>

<p>

Someone special has a birthday coming… ❤️

Tap below to continue

</p>

<button onclick="window.location.href='Memories.html'">
Continue →
</button>
</div>

</div>




</div>



<script>

let count=5;

let timer=setInterval(()=>{

count--;

document.getElementById("number").innerText=count;

if(count==0){

clearInterval(timer);

next(2);

}

},1000);



function next(n){

document.querySelectorAll(".page")

.forEach(x=>x.classList.remove("active"));

document.getElementById("page"+n)

.classList.add("active");

}



function celebrate(){

for(let i=0;i<40;i++){

let h=document.createElement("div");

h.className="hearts";

h.innerHTML=["💖","🎉","✨","🎂"][

Math.floor(Math.random()*4)

];

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=

Math.random()*4+3+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},5000);

}

}

</script>

</body>

</html>
